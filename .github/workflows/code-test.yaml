name: test-the-code-with-infrastructure
on: workflow_call

jobs:
  integration-test:
    runs-on: ubuntu-latest
    cancel-timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm install

      - name: Run linter (ESLint)
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm run test